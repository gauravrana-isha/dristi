name: Scrape X (Twitter)
on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Run X scraper
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
        run: python scrapers/x_scraper.py
