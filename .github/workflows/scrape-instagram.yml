name: Scrape Instagram
on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Run Instagram scraper
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
        run: python scrapers/instagram_scraper.py
